<!DOCTYPE html>
<html>
<head>
    <title>Registro Estudiante</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #f0f4ff;
            --card:         #ffffff;
            --primary:      #1E1BD2;
            --primary-dark: #1512a8;
            --text:         #1a1a2e;
            --muted:        #6b7280;
            --border:       #e2e8f0;
            --error-bg:     #fff0f0;
            --error:        #dc2626;
            --input-bg:     #f8faff;
            --shadow:       0 8px 40px rgba(30,27,210,0.10);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
            background-image:
                radial-gradient(circle at 15% 15%, rgba(30,27,210,0.07) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(79,70,229,0.06) 0%, transparent 50%);
        }

        .wrapper {
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .header .icon {
            width: 52px; height: 52px;
            background: var(--primary);
            border-radius: 14px;
            display: inline-grid;
            place-items: center;
            margin-bottom: 0.8rem;
            box-shadow: 0 4px 16px rgba(30,27,210,0.25);
        }

        .header .icon svg { width:26px; height:26px; fill:white; }

        .header h2 {
            font-family: 'Sora', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .header p {
            font-size: 0.88rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.2rem 2rem;
            box-shadow: var(--shadow);
        }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--error-bg);
            border: 1px solid #fca5a5;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--error);
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 1.4rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;
        }

        .field { margin-bottom: 1.1rem; }
        .field.full { grid-column: 1 / -1; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30,27,210,0.10);
            background: #fff;
        }

        .notas-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0.4rem 0 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--bg);
        }

        .notas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.4rem;
        }

        .actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.4rem;
        }

        button[type="submit"] {
            flex: 1;
            padding: 0.9rem;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 16px rgba(30,27,210,0.25);
        }

        button[type="submit"]:active { transform: scale(0.99); }

        .btn-back {
            padding: 0.9rem 1.2rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: grid;
            place-items: center;
            transition: background 0.2s;
        }

        .btn-back:hover { background: #e8eaf6; }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="header">
        <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <h2>Registro de Estudiante</h2>
        <p>Completa los datos para registrar un nuevo estudiante</p>
    </div>

    <div class="card">

        {% if error %}
        <div class="error-msg">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10A8 8 0 1 1 2 10a8 8 0 0 1 16 0zm-7-4a1 1 0 1 0-2 0v4a1 1 0 0 0 2 0V6zm-1 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="grid-2">
                <div class="field full">
                    <label for="txtnombre">Nombre completo</label>
                    <input type="text" id="txtnombre" name="txtnombre" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="field">
                    <label for="txtedad">Edad</label>
                    <input type="number" id="txtedad" name="txtedad" placeholder="Ej: 20" required>
                </div>

                <div class="field">
                    <label for="txtcarrera">Carrera</label>
                    <input type="text" id="txtcarrera" name="txtcarrera" placeholder="Ej: Ingeniería" required>
                </div>
            </div>

            <div class="notas-label">Notas</div>

            <div class="notas-grid">
                <div class="field">
                    <label for="txtnota1">Nota 1</label>
                    <input type="number" step="0.1" id="txtnota1" name="txtnota1" placeholder="0.0" min="0" max="5" required>
                </div>
                <div class="field">
                    <label for="txtnota2">Nota 2</label>
                    <input type="number" step="0.1" id="txtnota2" name="txtnota2" placeholder="0.0" min="0" max="5" required>
                </div>
                <div class="field">
                    <label for="txtnota3">Nota 3</label>
                    <input type="number" step="0.1" id="txtnota3" name="txtnota3" placeholder="0.0" min="0" max="5" required>
                </div>
            </div>

            <div class="actions">
                <a href="/dashprincipal" class="btn-back">← Volver</b></a>
                <button type="submit">Registrar estudiante</button>
            </div>

        </form>
    </div>
</div>
</body>
</html>
